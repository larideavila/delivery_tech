spring.application.name=deliverytech_fat
#Configurações do servidor
server.port=8080

# Configuração do H2 Database 
#Configuração para usar o H2 em modo de memória
spring.datasource.url=jdbc:h2:mem:deliverydb 
spring.datasource.driverClassName=org.h2.Driver 
spring.datasource.username=sa
spring.datasource.password=

# Console H2
spring.h2.console.enabled=true 
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Configuração para criar e dropar o banco de dados a cada execução
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações de desenvolvimento
spring.devtools.restart.enabled=true

# Configurações específicas para JDK 21
spring.jpa.open-in-view=false
logging.level.org.springframework.web=DEBUG